<!DOCTYPE html>
<html>
<head>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020617; font-family: sans-serif; }

    .hero {
        position: relative;
        height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #020617;
        cursor: crosshair;
    }

    .hero-grid {
        position: absolute;
        inset: 0;
        opacity: 0.05;
        background-image: radial-gradient(circle, #fff 1px, transparent 1px);
        background-size: 30px 30px;
    }

    .float-layer {
        position: absolute;
        will-change: transform;
        transition: transform 0.25s ease-out;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .hero-text {
        position: relative;
        text-align: center;
        color: #fff;
        transition: transform 0.25s ease-out;
    }

    @media (prefers-reduced-motion: reduce) {
        .float-layer, .hero-text {
            transition: none !important;
            transform: none !important;
        }
    }
</style>
</head>
<body>
    <div class="hero" id="hero">
        <div class="hero-grid"></div>
        <div class="float-layer" data-speed="1" style="top:50%;left:20%;width:80px;height:80px;margin-top:-40px;">
            <div style="width:64px;height:64px;border-radius:16px;background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.3);backdrop-filter:blur(4px);"></div>
        </div>
        <div class="float-layer" data-speed="3" style="top:30%;left:72%;width:60px;height:60px;">
            <div style="width:56px;height:56px;border-radius:50%;background:rgba(168,85,247,0.2);border:1px solid rgba(168,85,247,0.3);backdrop-filter:blur(4px);"></div>
        </div>
        <div class="float-layer" data-speed="5" style="top:25%;left:35%;width:70px;height:70px;">
            <div style="width:40px;height:40px;transform:rotate(45deg);background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.3);backdrop-filter:blur(4px);"></div>
        </div>
        <div class="float-layer" data-speed="2" style="top:62%;left:30%;width:50px;height:50px;">
            <div style="width:48px;height:48px;border-radius:12px;background:rgba(245,158,11,0.2);border:1px solid rgba(245,158,11,0.3);backdrop-filter:blur(4px);transform:rotate(12deg);"></div>
        </div>
        <div class="float-layer" data-speed="4" style="top:60%;left:68%;width:40px;height:40px;">
            <div style="width:32px;height:32px;border-radius:50%;background:rgba(244,63,94,0.2);border:1px solid rgba(244,63,94,0.3);backdrop-filter:blur(4px);"></div>
        </div>
        <div class="float-layer" data-speed="2.5" style="top:40%;left:55%;width:90px;height:90px;">
            <div style="width:80px;height:80px;border-radius:24px;background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.2);backdrop-filter:blur(4px);"></div>
        </div>
        <div class="hero-text" data-speed="0.5">
            <h2 style="font-size:1.875rem;font-weight:800;margin-bottom:0.5rem;">Move Your Mouse</h2>
            <p style="color:#64748b;">Elements shift based on cursor position</p>
        </div>
    </div>

    <script>
        const hero = document.getElementById('hero');
        const layers = hero.querySelectorAll('[data-speed]');
        const sensitivity = 11;
        const invert = false;

        hero.addEventListener('mousemove', (e) => {
            const rect = hero.getBoundingClientRect();
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const dx = ((x - centerX) / centerX) * sensitivity;
            const dy = ((y - centerY) / centerY) * sensitivity;
            const dir = invert ? -1 : 1;

            layers.forEach(layer => {
                const speed = parseFloat(layer.dataset.speed);
                layer.style.transform = `translate3d(${dx * speed * dir}px, ${dy * speed * dir}px, 0)`;
            });
        });

        hero.addEventListener('mouseleave', () => {
            layers.forEach(layer => {
                layer.style.transform = 'translate3d(0, 0, 0)';
            });
        });
    </script>
</body>
</html>
